<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الحارس التكتيكي | Tactical Sentinel</title>
  </head>
  <body class="bg-surface text-slate-200 font-sans" dir="rtl">
    <div id="app" class="min-h-screen flex flex-col">
      <!-- Header -->
      <header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-surface border-b border-outline-variant/15">
        <div class="flex items-center gap-4">
          <button id="mobile-menu-btn" class="md:hidden p-2 text-slate-400 hover:text-white transition-colors">
            <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
          </button>
          <button id="home-btn" class="hidden md:flex p-2 text-slate-400 hover:text-white transition-colors items-center gap-2">
            <i data-lucide="arrow-right" class="w-5 h-5"></i>
            <span class="text-xs font-bold uppercase tracking-widest">الرئيسية</span>
          </button>
          <span class="text-xl font-bold tracking-tighter text-primary-container font-headline">مراقبة النظام</span>
          <div class="hidden lg:flex items-center gap-2 px-3 py-1 rounded-full bg-secondary-container/10 border border-secondary/20">
            <span class="w-2 h-2 rounded-full bg-secondary animate-pulse"></span>
            <span class="text-[10px] font-bold uppercase tracking-widest text-secondary">النظام: مستقر</span>
          </div>
        </div>
        
        <div class="flex items-center gap-6">
          <button class="hidden md:block text-slate-400 font-medium hover:text-white transition-colors text-sm uppercase tracking-widest">
            تجاوز الطوارئ
          </button>
        </div>
      </header>

      <div class="flex flex-1 pt-16">
        <!-- Mobile Sidebar Overlay -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-30 hidden"></div>

        <!-- Sidebar Navigation -->
        <aside id="sidebar" class="fixed right-0 top-0 h-full flex flex-col pt-20 pb-8 bg-surface-low w-64 shadow-[-40px_0_60px_-15px_rgba(0,0,0,0.3)] z-40 transition-transform duration-300 ease-in-out translate-x-full md:translate-x-0">
          <div class="px-6 mb-8">
            <h2 class="text-lg font-black text-white font-headline uppercase tracking-tighter">التحكم في النظام</h2>
          </div>
          
          <nav class="flex-1">
            <button data-view="dashboard" class="nav-btn w-full flex items-center px-6 py-4 transition-all duration-300 ease-out group text-primary-container bg-surface-high border-l-4 border-primary-container">
              <i data-lucide="layout-dashboard" class="w-5 h-5 ml-4"></i>
              <span class="text-sm uppercase tracking-widest">لوحة التحكم</span>
            </button>
            <button data-view="cameras" class="nav-btn w-full flex items-center px-6 py-4 transition-all duration-300 ease-out group text-slate-500">
              <i data-lucide="video" class="w-5 h-5 ml-4"></i>
              <span class="text-sm uppercase tracking-widest">بث الكاميرات</span>
            </button>
            <button data-view="history" class="nav-btn w-full flex items-center px-6 py-4 transition-all duration-300 ease-out group text-slate-500">
              <i data-lucide="history" class="w-5 h-5 ml-4"></i>
              <span class="text-sm uppercase tracking-widest">السجل</span>
            </button>
          </nav>

          <div class="mt-auto px-6 space-y-4">
            <div class="pt-4 border-t border-outline-variant/10 flex justify-around">
              <button class="text-slate-500 hover:text-slate-200 transition-colors">
                <i data-lucide="help-circle" class="w-5 h-5"></i>
              </button>
              <button class="text-slate-500 hover:text-slate-200 transition-colors">
                <i data-lucide="terminal" class="w-5 h-5"></i>
              </button>
            </div>
          </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 md:mr-64 p-4 md:p-8 transition-all duration-300">
          <div id="content-area" class="max-w-7xl mx-auto">
            <!-- Content will be injected here -->
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
